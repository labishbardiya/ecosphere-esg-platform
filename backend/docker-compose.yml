
services:
  db:
    image: postgres:16-alpine
    container_name: ecosphere_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecosphere_social
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: ecosphere_redis
    restart: always
    ports:
      - "6379:6379"

  web:
    build: .
    container_name: ecosphere_web
    restart: always
    command: sh -c "python wait_for_db.py && alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/ecosphere_social
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=supersecretjwtkeyforprodreplaceinproduction
      - JWT_ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=60
      - LOG_LEVEL=INFO
    depends_on:
      - db
      - redis
    volumes:
      - .:/workspace
      - uploads_data:/workspace/uploads

  worker:
    build: .
    container_name: ecosphere_worker
    restart: always
    command: sh -c "python wait_for_db.py && celery -A app.workers.celery_app worker --loglevel=info"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/ecosphere_social
      - REDIS_URL=redis://redis:6379/0
      - LOG_LEVEL=INFO
    depends_on:
      - db
      - redis
    volumes:
      - .:/workspace
      - uploads_data:/workspace/uploads

  beat:
    build: .
    container_name: ecosphere_beat
    restart: always
    command: sh -c "python wait_for_db.py && celery -A app.workers.celery_app beat --loglevel=info"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/ecosphere_social
      - REDIS_URL=redis://redis:6379/0
      - LOG_LEVEL=INFO
    depends_on:
      - db
      - redis
    volumes:
      - .:/workspace

volumes:
  postgres_data:
  uploads_data:
